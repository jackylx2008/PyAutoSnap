app:
  log_level: "${LOG_LEVEL:-INFO}"
  output_dir: "${OUTPUT_DIR:-output/screenshots}"
  default_entry: "autosnap"

flows:
  auto_snap:
    interval_seconds: "${SNAP_INTERVAL_SECONDS:-15}"
    capture_count: "${SNAP_CAPTURE_COUNT:-0}"
    image_format: "${SNAP_IMAGE_FORMAT:-png}"
    filename_template: "snap_{timestamp}_{sequence:04d}.{extension}"
    all_screens: true
    jpeg_quality: 95
    flash_after_capture: true
    flash_cycles: 2
    flash_duration_ms: 160
    flash_hold_ms: 500
    flash_border_width: 6
    region:
      screen_index: 3
      left: 400
      top: 250
      width: 800
      height: 980
